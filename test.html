<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        padding: 0;
        margin: 0;
      }
      .container {
        width: 100%;
      }
      .innercontainer {
        height: 100vh;
      }

      .red {
        /* background: rgb(85, 20, 20); */
        height: 1500px;
        position: relative;
        padding: 8px;
      }
      .green {
        background-color: green;
      }

      .text {
        color: white;
        width: 320px;
        padding: 4px;
        border: 4px solid tomato;
        margin-top: 8px;
        margin-bottom: 16px;
      }

      .backgroundDiv {
        width: 100%;
        height: 100%;
        background: rgb(85, 20, 20);
        position: fixed;
        top: 0;
        z-index: -1;
      }

      .white {
        height: 800px;
        background: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="innercontainer white"></div>
      <div class="innercontainer red">
        <div class="text">
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Expedita odio
          optio quia ex ullam cumque nulla inventore. Doloribus accusamus
          voluptatibus sapiente, qui pariatur soluta, beatae veniam praesentium
          similique facere nam!
        </div>
        <div class="innercontainer green"></div>
        <div class="backgroundDiv"></div>
      </div>
    </div>
  </body>
</html>
